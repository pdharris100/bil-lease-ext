<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Bilbasen Lease Helper</title>
    <script src="popup.js" defer></script>
</head>

<body style="width: 320px">
    <div style="font-size: 14px; line-height: 1.4">
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Nypris</div>
            <div id="nypris">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Nypris + extras</div>
            <div id="nyprisPlusExtras">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Restværdi</div>
            <div id="restvaerdi">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>First tax tier</div>
            <div id="firstTaxTier">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Second tax tier</div>
            <div id="secondTaxTier">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Third tax tier</div>
            <div id="thirdTaxTier">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>Total afgift</div>
            <div id="totalAfgift">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>After Bundfradrag</div>
            <div id="bundfradrag">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>After Indfasning Fradrag</div>
            <div id="indfasning">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px">
            <div>After EV Fradrag</div>
            <div id="evFradrag">–</div>
        </div>
        <div style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; font-weight: 700">
            <div>Break even price</div>
            <div id="breakEvenPrice">–</div>
        </div>
        <div id="status" style="font-size: 12px"></div>
    </div>
</body>

</html>
